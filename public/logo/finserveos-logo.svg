<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <!-- Icon badge -->
  <rect width="56" height="56" x="8" y="8" rx="14" fill="#D91B24"/>
  <rect width="56" height="56" x="8" y="8" rx="14" fill="url(#iconGrad)" opacity="0.35"/>

  <!-- F letterform -->
  <rect x="22" y="22" width="28" height="5" rx="2.5" fill="white"/>
  <rect x="22" y="22" width="5" height="28" rx="2.5" fill="white"/>
  <rect x="22" y="33" width="20" height="5" rx="2.5" fill="white"/>

  <!-- Wordmark -->
  <text x="78" y="38" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif"
    font-size="22" font-weight="900" letter-spacing="-0.5" fill="#171717">FinServe</text>
  <text x="78" y="56" font-family="'Lato', 'Helvetica Neue', Arial, sans-serif"
    font-size="13" font-weight="700" letter-spacing="3" fill="#D91B24">OS</text>

  <!-- Gradient def -->
  <defs>
    <linearGradient id="iconGrad" x1="8" y1="8" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="#991016"/>
    </linearGradient>
  </defs>
</svg>
